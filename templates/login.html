<!DOCTYPE html>
<html>
<head>
<title>EcoWatch Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#050816,#111827,#0f172a,#1e293b);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:400px;
padding:40px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
color:white;
box-shadow:0 8px 32px rgba(0,0,0,.4);
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.1);
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00ffb3,#00cfff);
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<h1>🌍 EcoWatch</h1>

<form action="/login" method="POST">

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

</div>

</body>
</html>
